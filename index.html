<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>🎬Player</title>
  <link rel="stylesheet" href="css/stylem3u8.css">
 
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <h2>🎬Player</h2>

  <div class="section" style="display:flex; flex-wrap: wrap; gap: 10px;">
   <button class="navigable" id="btnMinhasListas" tabindex="0">🔥 Listas</button>
   <button class="navigable" id="btnLoadPlaylist" tabindex="0">📡 Playlists Remotas</button>
   <button class="navigable" id="btnUpload" tabindex="0">📤 Upload Arquivo</button>
    
   <!-- 
   <button class="navigable" id="btnLocal" tabindex="0">📁 Playlists Locais</button>
    <button class="navigable" id="btnSingle" tabindex="0">🔗 Canal Único</button>
    -->
    
    
  </div>

  <div class="section" id="remotePlaylistSelector" style="display:none; margin-top:10px;">
    <h3>📡 Playlists Remotas Disponíveis:</h3>
    <ul id="remotePlaylistList"></ul>
    <button class="navigable" id="btnBackFromRemote" style="margin-top:10px;">⬅️ Voltar</button>
  </div>

  <div class="section" id="playlistSelector" style="display:none; margin-top:10px;">
    <h3>📂 Playlists Locais:</h3>
    <ul id="playlistList"></ul>
    <button class="navigable" id="btnBackFromLocal" style="margin-top:10px;">⬅️ Voltar</button>
  </div>

  <div class="section">
    <label>📺 Canais:</label>
    <ul id="channelList"></ul>
  </div>

  <div id="messageArea"></div>

  <!-- Scripts modulares - ORDEM IMPORTANTE! -->
  <script src="js/state.js"></script>
  <script src="js/state-manager.js"></script>
  <script src="js/player.js"></script>
  <script src="js/search.js"></script>
  <script src="js/channels.js"></script>
  <script src="js/playlists.js"></script>
  <script src="js/FilterModule.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/app.js"></script>
  
  <script>
        // Log de verificação de carregamento
        console.log('╔══════════════════════════════════════╗');
        console.log('📦 VERIFICAÇÃO DE MÓDULOS CARREGADOS');
        console.log('╚══════════════════════════════════════╝');
        
        const modules = {
            'PlaylistConfig': typeof PlaylistConfig !== 'undefined',
            'AppState': typeof AppState !== 'undefined',
            'StateManager': typeof StateManager !== 'undefined',
            'DocumentsManager': typeof DocumentsManager !== 'undefined',
            'ChannelModule': typeof ChannelModule !== 'undefined',
            'PlaylistModule': typeof PlaylistModule !== 'undefined',
            'NavigationModule': typeof NavigationModule !== 'undefined',
            'InlinePlayerModule': typeof InlinePlayerModule !== 'undefined',
            'PlayerModule': typeof PlayerModule !== 'undefined',
            'SearchModule': typeof SearchModule !== 'undefined'
        };
        
        Object.entries(modules).forEach(([name, loaded]) => {
            console.log(`${loaded ? '✅' : '❌'} ${name}`);
        });
        
        const allLoaded = Object.values(modules).every(v => v);
        console.log(allLoaded ? '✅ Todos os módulos carregados!' : '❌ Alguns módulos faltando!');
        console.log('╚══════════════════════════════════════╝');
    </script>
</body>
</html>
